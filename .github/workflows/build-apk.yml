name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Build APK
        run: npx eas build --platform android --profile preview --local --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: 1
          EAS_SKIP_AUTO_FINGERPRINT: 1

      - name: Rename APK
        run: |
          APK=$(find . -name "*.apk" -type f | head -1)
          echo "Found APK: $APK"
          cp "$APK" "LiveMe.apk"
          echo "APK_SIZE=$(stat -f%z LiveMe.apk 2>/dev/null || wc -c < LiveMe.apk)" >> $GITHUB_ENV

      - name: Delete old release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: LiveMe APK
          body: |
            Latest LiveMe APK — build #${{ github.run_number }}
            Commit: ${{ github.sha }}
          files: LiveMe.apk
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
