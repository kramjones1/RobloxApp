name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Build APK
        run: npx eas build --platform android --profile preview --local --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: 1
          EAS_SKIP_AUTO_FINGERPRINT: 1

      - name: Find APK output
        run: find . -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "No APK/AAB found in workspace"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveMe-APK
          path: |
            **/*.apk
            **/*.aab
