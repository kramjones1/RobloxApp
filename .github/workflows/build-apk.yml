name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Build APK
        run: npx eas build --platform android --profile preview --local --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EAS_NO_VCS: 1
          EAS_SKIP_AUTO_FINGERPRINT: 1

      - name: Find APK
        run: |
          echo "Looking for APK..."
          find . -name "*.apk" -type f
          echo "APK_PATH=$(find . -name '*.apk' -type f | head -1)" >> $GITHUB_ENV

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.sha }}
          name: LiveMe APK Build #${{ github.run_number }}
          body: |
            Latest LiveMe APK
            Built from commit ${{ github.sha }}
          files: |
            **/*.apk
          fail_on_unmatched_files: false
          draft: false
          prerelease: false
          generate_release_notes: false
